<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hemlock CPA Company — Trusted accounting for Western PA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body { margin: 0; scroll-behavior: smooth; }
    button { font-family: var(--font-sans); }
  </style>
</head>
<body>
  <!-- Static placeholder form for Netlify's build-time form detection.
       The real, user-facing form is rendered by React inside <ContactModal>.
       Netlify needs this static markup at build time to register the form;
       the real submissions are POSTed via AJAX from the modal. -->
  <form name="consultation" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="consultation" />
    <input type="text"   name="bot-field" />
    <input type="text"   name="name" />
    <input type="email"  name="email" />
    <input type="text"   name="business" />
    <input type="text"   name="industry" />
    <textarea name="message"></textarea>
  </form>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/Nav.jsx"></script>
  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/Services.jsx"></script>
  <script type="text/babel" src="components/WhoWeServe.jsx"></script>
  <script type="text/babel" src="components/Process.jsx"></script>
  <script type="text/babel" src="components/ServiceTiles.jsx"></script>
  <script type="text/babel" src="components/CtaBand.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>
  <script type="text/babel" src="components/ContactModal.jsx"></script>

  <script type="text/babel">
    const App = () => {
      const [consultOpen, setConsultOpen] = React.useState(false);
      React.useEffect(() => { window.openConsult = () => setConsultOpen(true); }, []);
      return (
        <>
          <Nav active="home" />
          <Hero />
          <Services />
          <WhoWeServe />
          <Process />
          <ServiceTiles />
          <CtaBand />
          <Footer />
          <ContactModal open={consultOpen} onClose={() => setConsultOpen(false)} />
        </>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
